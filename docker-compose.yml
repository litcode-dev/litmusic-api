

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litmusic
      POSTGRES_PASSWORD: litmusic
      POSTGRES_DB: litmusic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litmusic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

  beat:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

volumes:
  postgres_data:
